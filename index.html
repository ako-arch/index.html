<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before / After Test</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#111;
      font-family:Arial,sans-serif;
      color:#fff;
      padding:30px;
    }

    .wrap{
      max-width:1000px;
      margin:0 auto;
    }

    h1{
      text-align:center;
      margin-bottom:22px;
      font-size:32px;
      font-weight:800;
    }

    .compare{
      --pos: 50%;
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      overflow:hidden;
      border-radius:22px;
      background:#222;
    }

    .layer{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      pointer-events:none;
      user-select:none;
    }

    .after-layer{
      background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop');
      z-index:1;
    }

    .before-layer{
      background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop&sat=-100&contrast=80');
      clip-path:inset(0 calc(100% - var(--pos)) 0 0);
      z-index:2;
    }

    .divider{
      position:absolute;
      top:0;
      left:var(--pos);
      transform:translateX(-50%);
      width:2px;
      height:100%;
      background:#fff;
      z-index:4;
    }

    .handle{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      color:#111;
      font-size:24px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 20px rgba(0,0,0,.3);
    }

    .label{
      position:absolute;
      top:16px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.5);
      font-weight:700;
      z-index:5;
    }

    .label.left{ left:16px; }
    .label.right{ right:16px; }

    .slider{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      opacity:0;
      z-index:10;
      cursor:ew-resize;
      -webkit-appearance:none;
      appearance:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Before / After Test</h1>

    <div class="compare" id="compareBox">
      <div class="layer after-layer"></div>
      <div class="layer before-layer"></div>

      <div class="label left">ก่อน</div>
      <div class="label right">หลัง</div>

      <div class="divider">
        <div class="handle">↔</div>
      </div>

      <input class="slider" type="range" min="0" max="100" value="50" id="slider">
    </div>
  </div>

  <script>
    const compareBox = document.getElementById('compareBox');
    const slider = document.getElementById('slider');

    function updateSlider(value){
      compareBox.style.setProperty('--pos', value + '%');
    }

    updateSlider(slider.value);

    slider.addEventListener('input', function(){
      updateSlider(this.value);
    });
  </script>
</body>
</html>
